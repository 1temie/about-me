<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temie</title>
  <meta property="og:title" content="Temmie">
  <meta property="og:description" content="developer & reseller — C++, C#, Lua, Python">
  <meta property="og:image" content="https://i1.sndcdn.com/artworks-000159159528-hpnrcr-t500x500.jpg">
  <meta property="og:url" content="https://temie.lol">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#f5c542">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Temmie">
  <meta name="twitter:description" content="developer & reseller — C++, C#, Lua, Python">
  <meta name="twitter:image" content="https://i1.sndcdn.com/artworks-000159159528-hpnrcr-t500x500.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%;
      background: #141414; color: #e8e4da;
      font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
      overflow: hidden; cursor: default;
    }

    body {
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; position: relative;
    }

    body::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(80,120,220,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 180px 180px; pointer-events: none; z-index: 0; opacity: 0.35;
    }

    .box {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      max-width: 820px; width: 100%;
    }

    .row { display: flex; align-items: center; gap: 20rem; }

    .name {
      font-size: clamp(2.75rem, 10vw, 6.5rem);
      font-weight: 400; font-style: italic;
      letter-spacing: 0.02em; line-height: 1;
      opacity: 0; white-space: nowrap;
      animation: a-reveal 1s cubic-bezier(0.16,1,0.3,1) forwards;
      text-shadow: 0 0 40px rgba(100,140,255,0.12);
    }

    .pic {
      flex-shrink: 0; opacity: 0; margin-top: 3rem;
      animation: a-in 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .pic img {
      width: clamp(80px,11vw,140px); height: clamp(80px,11vw,140px);
      border-radius: 50%; object-fit: cover; display: block;
      filter: grayscale(30%) brightness(0.88);
      border: 1px solid rgba(100,140,255,0.15);
      box-shadow: 0 0 40px rgba(80,120,220,0.08);
      transition: filter 0.5s ease;
    }

    .pic img:hover { filter: grayscale(0%) brightness(1); }

    .tag {
      margin-top: 0.9rem;
      font-size: clamp(0.85rem,2.2vw,1.05rem);
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(232,228,218,0.65);
      opacity: 0; animation: a-up 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
    }

    .hr {
      width: 0; height: 1px;
      background: rgba(100,140,255,0.2); margin-top: 2rem;
      animation: a-exp 0.7s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }

    .skills {
      display: flex; flex-wrap: wrap; gap: 0.5rem 1.4rem; margin-top: 1.8rem;
      opacity: 0; animation: a-up 0.6s ease 0.8s forwards;
    }

    .sk {
      font-size: clamp(0.78rem,1.8vw,0.92rem);
      letter-spacing: 0.12em; color: rgba(232,228,218,0.52);
      font-style: italic; transition: color 0.4s ease;
      cursor: default; position: relative;
    }

    .sk::before {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: rgba(140,170,255,0.5);
      transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    .sk:hover { color: rgba(232,228,218,0.9); }
    .sk:hover::before { width: 100%; }

    .roles {
      margin-top: 2.2rem; display: flex; flex-direction: column; gap: 0.55rem;
      opacity: 0; animation: a-up 0.6s ease 1s forwards;
    }

    .role {
      display: flex; align-items: center; gap: 1rem;
      font-size: clamp(0.8rem,2vw,0.98rem);
      color: rgba(232,228,218,0.48);
      letter-spacing: 0.18em; text-transform: uppercase;
    }

    .role-m {
      width: 18px; height: 1px;
      background: rgba(100,140,255,0.3); flex-shrink: 0;
    }

    .links {
      margin-top: 2.6rem; display: flex; gap: 2rem;
      opacity: 0; animation: a-up 0.6s ease 1.2s forwards;
    }

    .lnk {
      font-size: clamp(0.78rem,1.8vw,0.88rem);
      color: rgba(232,228,218,0.48); text-decoration: none;
      letter-spacing: 0.14em; text-transform: uppercase;
      transition: color 0.4s ease; position: relative;
    }

    .lnk::after {
      content: ''; position: absolute; bottom: -3px; left: 0; right: 0;
      height: 1px; background: rgba(140,170,255,0.4);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
    }

    .lnk:hover { color: rgba(232,228,218,0.85); }
    .lnk:hover::after { transform: scaleX(1); }

    .corner {
      position: fixed; bottom: 2rem; right: 2rem;
      font-size: 0.72rem; letter-spacing: 0.2em;
      color: rgba(232,228,218,0.25); text-transform: uppercase;
      opacity: 0; animation: a-up 0.6s ease 1.4s forwards; z-index: 2;
    }

    .veil {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: #141414;
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1);
    }

    .veil.gone { opacity: 0; pointer-events: none; }

    .v-in {
      display: flex; flex-direction: column;
      align-items: center; gap: 1.4rem; user-select: none;
    }

    .v-name {
      font-size: clamp(2rem,8vw,5rem);
      font-weight: 400; font-style: italic; letter-spacing: 0.06em;
      color: rgba(232,228,218,0.85); animation: a-pulse 3s ease-in-out infinite;
    }

    .v-hint {
      font-size: clamp(0.7rem,1.8vw,0.82rem);
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(232,228,218,0.45);
      animation: a-pulse 3s ease-in-out 0.6s infinite;
    }

    .v-dot {
      width: 36px; height: 1px; background: rgba(140,170,255,0.35);
      animation: a-pulse 3s ease-in-out 0.3s infinite;
    }

    @keyframes a-pulse  { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes a-reveal { 0% { opacity: 0; letter-spacing: 0.32em; filter: blur(10px); } 100% { opacity: 0.92; letter-spacing: 0.02em; filter: blur(0); } }
    @keyframes a-up     { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes a-in     { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes a-exp    { 0% { width: 0; } 100% { width: 100%; } }

    @media (max-width: 480px) { .pic img { width: 70px; height: 70px; } }
    @media (max-height: 540px) {
      html, body { overflow-y: auto; }
      body { align-items: flex-start; padding: 3rem 2rem; }
    }
  </style>
</head>
<body>

  <div class="veil" id="veil" onclick="show()">
    <div class="v-in">
      <div class="v-name">Temmie</div>
      <div class="v-dot"></div>
      <div class="v-hint">click to reveal</div>
    </div>
  </div>

  <div class="box">
    <div class="row">
      <div class="name">Temmie</div>
      <div class="pic">
        <img src="https://i1.sndcdn.com/artworks-000159159528-hpnrcr-t500x500.jpg" alt="Temie">
      </div>
    </div>
    <div class="tag">developer &amp; reseller</div>
    <div class="hr"></div>
    <div class="skills">
      <span class="sk">C++</span>
      <span class="sk">C#</span>
      <span class="sk">Lua</span>
      <span class="sk">Python</span>
      <span class="sk">HTML</span>
      <span class="sk">CSS</span>
    </div>
    <div class="roles">
      <div class="role"><span class="role-m"></span>software development</div>
      <div class="role"><span class="role-m"></span>reselling &amp; cheating</div>
    </div>
    <div class="links">
      <a class="lnk" href="mailto:tem@temie.cc">contact</a>
      <a class="lnk" href="https://github.com/1temie" target="_blank">github</a>
      <a class="lnk" href="https://discord.gg/5HwpXhNZge" target="_blank">discord</a>
    </div>
  </div>

  <div class="corner">est. 2026</div>

  <script>
    function show() { document.getElementById('veil').classList.add('gone'); }
  </script>

</body>
</html>
